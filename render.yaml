services:
  - type: web
    name: makrana-home-art
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: VITE_APP_NAME
        value: Makrana Home Art
      - key: VITE_APP_ENV
        value: production
      - key: VITE_ENABLE_DEV_ADMIN
        value: "false"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
